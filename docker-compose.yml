services:
  consumer-qwen:
    build:
      context: .
      dockerfile: consumer-qwen/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Qwen GGUF model — never bundled in the image, mounted read-only from host
      - ./consumer-qwen/models:/app/models:ro
      - plugins_cache:/app/plugins
    networks:
      - histovis-network
    restart: unless-stopped

  consumer-stardist:
    build:
      context: .
      dockerfile: consumer-stardist/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      # StarDist auto-downloads 2D_versatile_he on first start; persist across restarts
      - stardist_cache:/root/.stardist
      - plugins_cache:/app/plugins
    networks:
      - histovis-network
    restart: unless-stopped

  consumer-tileserver:
    build:
      context: .
      dockerfile: consumer-tileserver/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - tileserver_slides:/app/slides
      - plugins_cache:/app/plugins
    networks:
      - histovis-network
    restart: unless-stopped

volumes:
  stardist_cache:
  tileserver_slides:
  plugins_cache:

networks:
  histovis-network:
    external: true
